<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bread | OurManna API</title>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            background-color: #fcfaf7;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .verse-card {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            border-bottom: 1px solid #ddd;
            border-top: 1px solid #ddd;
        }
        #text {
            font-size: 1.8rem;
            line-height: 1.4;
            margin-bottom: 20px;
            display: block;
        }
        #ref {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }
        .notice {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="verse-card">
        <span id="text">Loading today's verse...</span>
        <div id="ref"></div>
        <div class="notice">Powered by OurManna.com</div>
    </div>

    <script>
        async function getVerse() {
            // Using a proxy to bypass CORS errors on GitHub
            const proxy = "https://corsproxy.io/?";
            const url = "https://beta.ourmanna.com/api/v1/get?format=json&order=daily";

            try {
                const response = await fetch(proxy + encodeURIComponent(url), {
                    headers: { "accept": "application/json" }
                });
                
                const data = await response.json();
                
                // Extracting data based on the API Reference you provided:
                // data.verse.details.text
                // data.verse.details.reference
                
                document.getElementById('text').innerText = `"${data.verse.details.text}"`;
                document.getElementById('ref').innerText = data.verse.details.reference;
                
            } catch (error) {
                console.error("Error fetching from OurManna:", error);
                document.getElementById('text').innerText = "Come to me, all you who are weary and burdened, and I will give you rest.";
                document.getElementById('ref').innerText = "Matthew 11:28";
            }
        }

        getVerse();
    </script>
</body>
</html>
