<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        :root { --bg: #0b0f1a; --card: #161b22; --accent: #00d2ff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--accent); width: 100%; max-width: 400px; display: inline-block; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #0b0f1a; color: white; box-sizing: border-box; }
        button { background: var(--accent); color: #000; padding: 10px; width: 100%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #adminUI { display: none; }
    </style>
</head>
<body>

    <div id="loginBox" class="box">
        <h2>Enter PIN</h2>
        <input type="password" id="pinInput" placeholder="Enter Secret Code">
        <button onclick="verify()">Login</button>
    </div>

    <div id="adminUI">
        <div class="box">
            <h2>Add New Post</h2>
            <input type="text" id="newName" placeholder="User Name">
            <textarea id="newMsg" placeholder="Message..."></textarea>
            <button id="submitBtn" onclick="sendPost()">ADD POST</button>
        </div>
    </div>

    <script>
        const sheetyUrl = 'https://api.sheety.co/4a5b706b013e0344bac43977b3c5475e/login/sheet1';

        function verify() {
            // Your secret code 8668
            if(document.getElementById('pinInput').value === "8668") {
                document.getElementById('loginBox').style.display = "none";
                document.getElementById('adminUI').style.display = "block";
            } else { alert("Wrong PIN!"); }
        }

        async function sendPost() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Sending...";
            
            const body = { 
                sheet1: {
                    name: document.getElementById('newName').value,
                    message: document.getElementById('newMsg').value,
                    date: new Date().toLocaleDateString()
                }
            };

            try {
                const response = await fetch(sheetyUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });

                if(response.ok) {
                    alert("Success! Post is now live.");
                    document.getElementById('newName').value = '';
                    document.getElementById('newMsg').value = '';
                } else {
                    const errorData = await response.text();
                    console.log(errorData);
                    alert("Submit failed. Check your Google Sheet column names.");
                }
            } catch (err) {
                alert("Network error. Is your internet connected?");
            } finally {
                btn.innerText = "ADD POST";
            }
        }
    </script>
</body>
</html>
