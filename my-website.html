\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephen Cloud | Community Feed</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b22;
            --accent: #00d2ff;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; letter-spacing: -1px; }
        
        .dm-button {
            display: inline-block;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            padding-bottom: 50px;
        }

        .post {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #30363d;
            transition: transform 0.2s;
        }

        .post:hover { transform: translateY(-5px); border-color: var(--accent); }

        .username { color: var(--accent); font-weight: 600; margin-bottom: 10px; display: block; }
        
        .content { font-size: 1.1rem; line-height: 1.5; color: #c9d1d9; }

        .date { display: block; margin-top: 15px; font-size: 0.8rem; color: #8b949e; }

        /* Tablet/Mobile logic */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .feed { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>stephencloud.online</h1>
        <p>Sending me a DM on Instagram to get featured on the cloud.</p>
        <a href="https://www.instagram.com/stephenmoheb/" class="dm-button">DM ME ON INSTA</a>
    </header>

    <div class="feed">
        
        <div class="post">
            <span class="username">@waiting_for_first_dm</span>
            <p class="content">"This is where your first community post will appear! Edit the HTML to change this text."</p>
            <span class="date">March 20, 2026</span>
        </div>
        </div>

</body>
</html>
