<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Stephen Cloud | Community Feed</title>
    <meta name="title" content="Stephen Cloud | Community Feed">
    <meta name="description" content="Official home of the Stephen Cloud Community Feed. Connect, stay updated, and explore our latest digital insights.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stephencloud.online/">
    <meta property="og:title" content="Stephen Cloud | Community Feed">
    <meta property="og:description" content="Check out the new Stephen Cloud Community Feed website!">
    <meta property="og:image" content="https://stephencloud.online/logo.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://stephencloud.online/">
    <meta property="twitter:title" content="Stephen Cloud | Community Feed">
    <meta property="twitter:description" content="Join the community at stephencloud.online">
    <meta property="twitter:image" content="https://stephencloud.online/logo.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d1117; /* Dark background to match your logo */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .logo {
            width: 180px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #00a3ff;
            box-shadow: 0 0 20px rgba(0, 163, 255, 0.3);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00a3ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.1rem;
            color: #8b949e;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background-color: #00a3ff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            background-color: #0082cc;
        }
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="Stephen Cloud Logo" class="logo">
        
        <h1>Stephen Cloud</h1>
        <p>Welcome to the <strong>Community Feed</strong>. We are currently building something amazing. Stay tuned for updates, digital insights, and community connections.</p>
        
        <a href="mailto:stephen@stephencloud.online" class="btn">Contact Me</a>
    </div>

    <div class="footer">
        © 2026 Stephen Cloud Community Feed. All rights reserved.
    </div>

</body>
</html>
